<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Poolsim sizing workflow</title>
  <desc id="desc">A flow diagram showing inputs moving through the poolsim sizing engine and into runtime pool settings.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f4ea"/>
      <stop offset="100%" stop-color="#efe5cc"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf6"/>
      <stop offset="100%" stop-color="#fff5da"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7b5b1a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b4d18"/>
    </marker>
    <style>
      .title { font: 700 38px Georgia, "Times New Roman", serif; fill: #2f2618; }
      .subtitle { font: 400 18px Georgia, "Times New Roman", serif; fill: #5d4a2e; }
      .box-title { font: 700 22px Georgia, "Times New Roman", serif; fill: #2f2618; }
      .body { font: 400 17px "Courier New", Courier, monospace; fill: #3d3323; }
      .small { font: 400 15px "Courier New", Courier, monospace; fill: #5d4a2e; }
    </style>
  </defs>

  <rect width="1200" height="540" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="90" fill="#f3d690" opacity="0.35"/>
  <circle cx="110" cy="470" r="120" fill="#d6e6d7" opacity="0.45"/>

  <text x="72" y="76" class="title">Poolsim Sizing Flow</text>
  <text x="72" y="108" class="subtitle">Measure workload, model queue pressure, recommend a pool size, then apply the result in your real runtime pool.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="158" width="260" height="250" rx="22" fill="url(#panel)" stroke="#caa96d" stroke-width="2"/>
    <rect x="382" y="138" width="430" height="290" rx="26" fill="#2b3a2e" stroke="#415b47" stroke-width="2"/>
    <rect x="862" y="158" width="266" height="250" rx="22" fill="url(#panel)" stroke="#caa96d" stroke-width="2"/>
  </g>

  <text x="102" y="204" class="box-title">Inputs</text>
  <text x="102" y="244" class="body">- requests per second</text>
  <text x="102" y="274" class="body">- p50 / p95 / p99 latency</text>
  <text x="102" y="304" class="body">- raw latency samples</text>
  <text x="102" y="334" class="body">- pool min / max bounds</text>
  <text x="102" y="364" class="body">- db connection limit</text>

  <text x="418" y="186" class="box-title" fill="#f9efcf">Sizing Engine</text>
  <text x="418" y="226" class="body" fill="#e7dbbc">1. validate inputs</text>
  <text x="418" y="258" class="body" fill="#e7dbbc">2. fit latency distribution</text>
  <text x="418" y="290" class="body" fill="#e7dbbc">3. estimate queue behavior</text>
  <text x="418" y="322" class="body" fill="#e7dbbc">4. run Monte Carlo simulation</text>
  <text x="418" y="354" class="body" fill="#e7dbbc">5. search candidate sizes</text>
  <text x="418" y="386" class="body" fill="#e7dbbc">6. build confidence + sensitivity</text>

  <rect x="420" y="404" width="350" height="2" fill="#a5bc9d" opacity="0.5"/>
  <text x="418" y="448" class="small" fill="#d7cfbd">Library, CLI, and REST/WebSocket API all expose the same sizing model.</text>

  <text x="892" y="204" class="box-title">Outputs</text>
  <text x="892" y="244" class="body">- recommended pool size</text>
  <text x="892" y="274" class="body">- confidence interval</text>
  <text x="892" y="304" class="body">- rho and queue wait</text>
  <text x="892" y="334" class="body">- saturation and risk</text>
  <text x="892" y="364" class="body">- sensitivity table</text>
  <text x="892" y="394" class="body">- settings for your real pool</text>

  <path d="M 332 282 C 350 282, 360 282, 382 282" fill="none" stroke="#7b4d18" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 812 282 C 832 282, 840 282, 862 282" fill="none" stroke="#7b4d18" stroke-width="5" marker-end="url(#arrow)"/>
</svg>
