name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from the root VERSION file to publish
        required: true
        type: string
      dry_run:
        description: Run packaging and publish dry-runs without releasing to crates.io
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify requested version matches VERSION
        shell: bash
        run: |
          set -euo pipefail
          expected_version="$(tr -d '[:space:]' < VERSION)"
          requested_version="${{ inputs.version }}"
          if [[ "$requested_version" != "$expected_version" ]]; then
            echo "workflow input version '$requested_version' does not match VERSION '$expected_version'" >&2
            exit 1
          fi

      - name: Validate version sync
        run: python3 tools/sync_version.py --check

      - name: Run pre-publish checks
        run: |
          cargo check --workspace
          cargo test --workspace
          cargo package -p poolsim-core --locked
          cargo package -p poolsim-cli --locked
          cargo package -p poolsim-web --locked

      - name: Dry run publish order
        if: ${{ inputs.dry_run }}
        run: |
          cargo publish -p poolsim-core --locked --dry-run
          cargo publish -p poolsim-cli --locked --dry-run
          cargo publish -p poolsim-web --locked --dry-run

      - name: Verify publish token is configured
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN is not configured" >&2
            exit 1
          fi

      - name: Publish poolsim-core
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p poolsim-core --locked

      - name: Wait for poolsim-core on crates.io
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import time
          import urllib.request

          crate = "poolsim-core"
          version = "${{ inputs.version }}"
          url = f"https://crates.io/api/v1/crates/{crate}"

          for attempt in range(30):
              with urllib.request.urlopen(url, timeout=20) as response:
                  payload = json.load(response)
              versions = {item["num"] for item in payload.get("versions", [])}
              if version in versions:
                  print(f"{crate} {version} is available on crates.io")
                  break
              print(f"waiting for {crate} {version} to appear on crates.io (attempt {attempt + 1}/30)")
              time.sleep(10)
          else:
              raise SystemExit(f"{crate} {version} did not appear on crates.io in time")
          PY

      - name: Publish poolsim-cli
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p poolsim-cli --locked

      - name: Publish poolsim-web
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p poolsim-web --locked
